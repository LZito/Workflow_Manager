name: Windows Installer

# Runs automatically when `gradle release` publishes a GitHub release.
# Builds a self-contained Windows app bundle (no Java required) and
# attaches it to the same release alongside the auto-update JAR.
on:
  release:
    types: [published]

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Strip the leading 'v' from the tag so jpackage gets a plain version number
      - name: Extract version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          echo "value=$v" >> $env:GITHUB_OUTPUT

      - name: Build fat JAR
        run: gradle shadowJar

      # jpackage --type app-image produces a self-contained folder with a bundled JRE.
      # No WiX required (unlike --type exe / --type msi).
      - name: Build app image
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          jpackage `
            --input     build\libs `
            --main-jar  workflow-manager.jar `
            --name      WorkflowManager `
            --app-version ${{ steps.ver.outputs.value }} `
            --dest      dist `
            --type      app-image

      # Zip the folder so users get a single download
      - name: Package as ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist\WorkflowManager `
            -DestinationPath "WorkflowManager-${{ steps.ver.outputs.value }}-windows.zip"

      # Attach the ZIP to the existing GitHub release
      - name: Upload to release
        shell: pwsh
        run: |
          gh release upload "${{ github.ref_name }}" `
            "WorkflowManager-${{ steps.ver.outputs.value }}-windows.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
